name: CI

# ============================================================================
# CI modular para monorepo (Go backend + Node frontend + infra)
#
# Features:
#   1. Path filters (dorny/paths-filter) — jobs rodam SÓ nos componentes
#      que mudaram. Mudou só `web/`? Não roda lint de Go.
#   2. Concurrency — cancela rodadas obsoletas em PRs (não cancela em main).
#   3. Cache Docker com scope por service — backend e frontend em caches
#      separados para não invalidar um ao outro.
#   4. Trivy SHA-pinned (v0.36.0, pós-supply-chain mar/2026).
#   5. GOTOOLCHAIN=local em jobs Go (impede go mod tidy de reescrever go.mod).
#   6. 12-Factor audit roda SEMPRE (gate de segurança).
#   7. i18n roda se QUALQUER componente muda (paridade de chaves é cross-cutting).
#
# ADR-0011 (harness/contrib/design-decisions.md) explica as decisões.
# ============================================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs em PRs; nunca cancela em main (protege release).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read
  security-events: write

env:
  # Versões pinadas — ver harness/stack/versions.md (fonte canônica)
  GO_VERSION: "1.26.5"
  NODE_VERSION: "24"
  PNPM_VERSION: "10"

jobs:
  # ==========================================================================
  # 1. Detecção de mudanças (1 job no topo — outputs viram gates dos outros)
  # ==========================================================================
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra:    ${{ steps.filter.outputs.infra }}
      docs:     ${{ steps.filter.outputs.docs }}
      workflow: ${{ steps.filter.outputs.workflow }}
      contracts:${{ steps.filter.outputs.contracts }}
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # dorny/paths-filter precisa do histórico completo
      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3.0.2
        with:
          # Filtros nomeados → viram outputs booleanos ('true'/'false')
          # Cada string é um glob. Use ! para excluir.
          filters: |
            backend:
              - 'backend/**'
              - 'backend/go.mod'
              - 'backend/go.sum'
            frontend:
              - 'web/**'
              - 'web/package.json'
              - 'web/pnpm-lock.yaml'
            infra:
              - 'deploy/**'
              - 'docker-compose.yml'
              - 'Dockerfile'
              - 'docs/SPEC.md'
            docs:
              - 'docs/**'
              - '**/*.md'
              - 'README.md'
            workflow:
              - '.github/workflows/ci.yml'
              - '.github/workflows/release.yml'
            contracts:
              - 'backend/api/openapi.yaml'
              - 'backend/api/openapi.json'
              - 'backend/codegen.yaml'

  # ==========================================================================
  # 2. Backend (Go) — só roda se backend OU infra OU workflow mudou
  # ==========================================================================
  backend-lint:
    name: Backend lint
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum
      - name: golangci-lint v2.12.2
        uses: golangci/golangci-lint-action@v6
        with:
          # Schema v2 puro. NUNCA v1.x. Para migrar: `golangci-lint migrate`.
          version: v2.12.2
          working-directory: backend
          args: --timeout=5m

  backend-test:
    name: Backend test + coverage
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Run tests (GOTOOLCHAIN=local impede reescrever go.mod)
        working-directory: backend
        env:
          GOTOOLCHAIN: local
        run: make test
      - name: Upload coverage
        if: hashFiles('backend/coverage.out') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: backend/coverage.out
          if-no-files-found: ignore

  backend-vuln:
    name: Backend vulnerability scan
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum
      - name: govulncheck
        working-directory: backend
        env:
          GOTOOLCHAIN: local
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "::warning::vuln check returned non-zero"
      - name: Upload SARIF
        if: always() && hashFiles('backend/govulncheck.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend/govulncheck.sarif

  backend-contract:
    name: Backend OpenAPI contract
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.contracts == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Install oapi-codegen v2.8.0
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.8.0
      - name: Regenerate and check diff
        working-directory: backend
        env:
          GOTOOLCHAIN: local
        run: |
          oapi-codegen --config=codegen.yaml api/openapi.yaml
          git diff --exit-code internal/api/openapi.gen.go
      - name: Spectral lint
        working-directory: backend
        run: npx --yes @stoplight/spectral-cli lint api/openapi.yaml

  # ==========================================================================
  # 3. Frontend (Node) — só roda se frontend OU infra OU workflow mudou
  # ==========================================================================
  frontend-lint:
    name: Frontend lint + typecheck
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Install deps
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: web
        run: pnpm lint
      - name: Typecheck
        working-directory: web
        run: pnpm typecheck

  frontend-test:
    name: Frontend test
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Install deps
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: Run tests
        working-directory: web
        run: pnpm test:run --coverage
      - name: Upload coverage
        if: hashFiles('web/coverage/') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: web/coverage/
          if-no-files-found: ignore

  frontend-vuln:
    name: Frontend vulnerability scan
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Install deps
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: pnpm audit
        working-directory: web
        run: pnpm audit --audit-level=high

  # ==========================================================================
  # 4. i18n audit — roda se QUALQUER componente muda (paridade é cross-cutting)
  # ==========================================================================
  i18n:
    name: i18n audit
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get install -y jq
      - name: Run i18n audit
        run: |
          if [ ! -f "scripts/check-i18n.sh" ]; then
            echo "❌ scripts/check-i18n.sh AUSENTE — copie de harness/scripts/"
            exit 1
          fi
          chmod +x scripts/check-i18n.sh
          ./scripts/check-i18n.sh .

  # ==========================================================================
  # 5. 12-Factor audit — SEMPRE (gate de segurança, mesmo sem mudança)
  # ==========================================================================
  twelve-factor:
    name: 12-Factor audit
    needs: changes
    # SEMPRE roda — gate de segurança não pode ser pulado.
    # (Sim, mesmo sem changes; custo é ~10s.)
    if: always() && needs.changes.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run audit
        run: |
          if [ ! -f "scripts/check-twelve-factor.sh" ]; then
            echo "❌ scripts/check-twelve-factor.sh AUSENTE"
            exit 1
          fi
          chmod +x scripts/check-twelve-factor.sh
          ./scripts/check-twelve-factor.sh .

  # ==========================================================================
  # 6. Build + image scan (condicional por escopo + infra)
  # ==========================================================================
  build-backend:
    name: Build backend image
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.infra == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend (cache scope=backend)
        uses: docker/build-push-action@v6
        with:
          context: .
          # Path canônico único do Dockerfile do backend (invariante 19).
          # Se você tem 2 Dockerfiles pro backend, está errado.
          file: deploy/Dockerfile.backend
          push: false
          load: true
          tags: app-backend:${{ github.sha }}
          # Cache com SCOPE por service: backend e frontend em caches
          # separados (não invalidar um ao outro).
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,mode=max,scope=backend
      - name: Trivy image scan (backend)
        # v0.36.0 (jul/2026) pós-supply-chain mar/2026. NUNCA @master.
        # Para prod crítica, SHA-pine.
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: app-backend:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Upload SARIF
        if: always() && hashFiles('trivy-backend.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif

  build-frontend:
    name: Build frontend image
    needs: changes
    if: |
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.infra == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build frontend (cache scope=frontend)
        uses: docker/build-push-action@v6
        with:
          context: web
          # Path canônico único do Dockerfile do frontend (invariante 19).
          file: web/Dockerfile
          push: false
          load: true
          tags: app-frontend:${{ github.sha }}
          # Scope separado — não conflita com cache do backend.
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,mode=max,scope=frontend
      - name: Trivy image scan (frontend)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: app-frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Upload SARIF
        if: always() && hashFiles('trivy-frontend.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif

  # ==========================================================================
  # 7. Summary (sempre roda, reporta status, bloqueia merge se vermelho)
  # ==========================================================================
  summary:
    name: CI summary
    needs:
      - changes
      - backend-lint
      - backend-test
      - backend-vuln
      - backend-contract
      - frontend-lint
      - frontend-test
      - frontend-vuln
      - i18n
      - twelve-factor
      - build-backend
      - build-frontend
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report
        run: |
          {
            echo "## CI Status"
            echo ""
            echo "| Job | Status |"
            echo "|---|---|"
            echo "| Detect changes | ${{ needs.changes.result }} |"
            echo "| Backend lint | ${{ needs.backend-lint.result }} |"
            echo "| Backend test | ${{ needs.backend-test.result }} |"
            echo "| Backend vuln | ${{ needs.backend-vuln.result }} |"
            echo "| Backend contract | ${{ needs.backend-contract.result }} |"
            echo "| Frontend lint | ${{ needs.frontend-lint.result }} |"
            echo "| Frontend test | ${{ needs.frontend-test.result }} |"
            echo "| Frontend vuln | ${{ needs.frontend-vuln.result }} |"
            echo "| i18n | ${{ needs.i18n.result }} |"
            echo "| 12-Factor | ${{ needs.twelve-factor.result }} |"
            echo "| Build backend | ${{ needs.build-backend.result }} |"
            echo "| Build frontend | ${{ needs.build-frontend.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Falha se qualquer job que rodou terminou em failure/cancelled.
          # Jobs skipped (path filter) são OK.
          for result in \
            ${{ needs.changes.result }} \
            ${{ needs.backend-lint.result }} \
            ${{ needs.backend-test.result }} \
            ${{ needs.backend-vuln.result }} \
            ${{ needs.backend-contract.result }} \
            ${{ needs.frontend-lint.result }} \
            ${{ needs.frontend-test.result }} \
            ${{ needs.frontend-vuln.result }} \
            ${{ needs.i18n.result }} \
            ${{ needs.twelve-factor.result }} \
            ${{ needs.build-backend.result }} \
            ${{ needs.build-frontend.result }}; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "❌ Some checks failed. Merge blocked." >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          done
          echo "✅ All relevant checks passed." >> "$GITHUB_STEP_SUMMARY"
