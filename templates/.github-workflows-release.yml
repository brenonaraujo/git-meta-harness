# ============================================================================
# GitHub Actions — Release Pipeline (v1.6.0+)
# ============================================================================
# Quando uma tag `vX.Y.Z` é pushed na main (ou workflow_dispatch manual):
#   1. Roda os 8 sensors (lint, test, vuln, contract, image, 12-factor, i18n, verify)
#   2. Builda imagens multi-arch (amd64 + arm64) para backend + frontend
#   3. Roda Trivy (block em CRITICAL)
#   4. Assina com cosign (keyless, OIDC GitHub)
#   5. Gera SBOM (SPDX)
#   6. Push para ghcr.io/<owner>/<repo>/<service>:<tag>
#   7. Cria GitHub Release com notas auto-geradas + SBOM anexado
# ============================================================================

name: release

on:
  push:
    tags:
      - "v*.*.*"  # vX.Y.Z (semver)
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag para release (ex: v0.1.0-rc.1)"
        required: true
        type: string

permissions:
  contents: write       # criar release, tag
  packages: write       # push para ghcr.io
  id-token: write       # cosign keyless (OIDC)
  attestations: write   # SLSA provenance
  security-events: write  # upload SARIF

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ==========================================================================
  # 1. Pre-flight sensors (re-rodar no release para garantir que tag == verde)
  # ==========================================================================
  preflight:
    name: Pre-flight sensors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run check-stack-versions.sh
        run: ./harness/scripts/check-stack-versions.sh
      - name: Run smoke test
        run: ./harness/scripts/smoke-test.sh

  # ==========================================================================
  # 2. Build & push backend
  # ==========================================================================
  backend:
    name: Build & push backend (${{ matrix.arch }})
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ github.event.repository.name }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=backend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile.backend
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.arch }}
          provenance: true
          sbom: true

      - name: Trivy scan (CRITICAL only)
        if: matrix.arch == 'amd64'
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ github.event.repository.name }}/backend:${{ github.ref_name }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: matrix.arch == 'amd64' && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif

      - name: Cosign sign (keyless)
        if: matrix.arch == 'amd64'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ github.event.repository.name }}/backend@${{ DIGEST }}

  # ==========================================================================
  # 3. Build & push frontend
  # ==========================================================================
  frontend:
    name: Build & push frontend (${{ matrix.arch }})
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ github.event.repository.name }}/frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=frontend
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.arch }}
          provenance: true
          sbom: true

      - name: Trivy scan (CRITICAL only)
        if: matrix.arch == 'amd64'
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ github.event.repository.name }}/frontend:${{ github.ref_name }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: matrix.arch == 'amd64' && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif

      - name: Cosign sign (keyless)
        if: matrix.arch == 'amd64'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ github.event.repository.name }}/frontend@${{ DIGEST }}

  # ==========================================================================
  # 4. Create GitHub Release with notes + SBOMs
  # ==========================================================================
  github-release:
    name: GitHub Release
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download SBOMs
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          path: sboms/
        continue-on-error: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          files: |
            sboms/**/*.spdx.json
